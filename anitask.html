<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-image: linear-gradient(pink,purple,black);
            position: relative;
            animation-name: box;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-delay:5s ;
        }
        div:hover{
            animation-play-state: paused;
        }
        @keyframes box{
            0%{
               top:0px;
               left: 0px; 
            }
            25%{
                top: 0px;
                left: 500px;
            }
            50%{
                top: 500px;
                left: 500px;
            }
            75%{
                left: 1000px;
                top: 500px;
            }
            100%{
                left: 0px;
                top: 0;
            }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
