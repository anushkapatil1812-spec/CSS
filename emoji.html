<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74ebd5,#9face6);
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

.emoji{
    font-size:120px;
    display:inline-block;
    cursor:pointer;
    transition:transform 0.5s ease;
    animation:bounce 2s infinite;
}

.emoji:hover{
    transform:scale(1.4) rotate(20deg);
}

.emoji:hover::after{
    content:"😍";
}

.emoji:hover{
    color:transparent;
    position:relative;
}

.emoji:hover::after{
    position:absolute;
    left:0;
    top:0;
    color:black;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-30px);
    }
}

h1{
    margin-top:20px;
    color:white;
    font-size:30px;
}

</style>

</head>
<body>

<div class="container">

    <div class="emoji">😊</div>

    <h1>Emoji Animation</h1>

    

</div>

</body>
</html>
