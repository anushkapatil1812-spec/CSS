<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
  
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#222;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:900px;
    height:700px;
    background:#fff;
    padding:10px;

    display:grid;
    gap:6px;

    grid-template-columns:1fr 1fr 1fr 1fr;
    grid-template-rows:repeat(6,2fr);
}

.box{
    background:red;
    color:black;
    font-size:14px;
    padding:5px;
}



.box1{
    grid-column:1/2;
    grid-row:1/4;
}

.box2{
    grid-column:2/4;
    grid-row:1/2;
}

.box3{
    grid-column:4/5;
    grid-row:1/2;
}

.box4{
    grid-column:2/3;
    grid-row:2/5;
}

.box5{
    grid-column:3/4;
    grid-row:2/5;
}

.box6{
    grid-column:4/5;
    grid-row:2/6;
}

.box7{
    grid-column:1/2;
    grid-row:4/6;
}

.box8{
    grid-column:2/3;
    grid-row:5/6;
}

.box9{
    grid-column:3/4;
    grid-row:5/6;
}
    </style>
</head>
<body>

<div class="container">
    <div class="box box1">Box 1</div>
    <div class="box box2">Box 2</div>
    <div class="box box3">Box 3</div>
    <div class="box box4">Box 4</div>
    <div class="box box5">Box 5</div>
    <div class="box box6">Box 6</div>
    <div class="box box7">Box 7</div>
    <div class="box box8">Box 8</div>
    <div class="box box9">Box 9</div>
</div>

</body>
</html>
