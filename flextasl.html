<title>Hexashop</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#fff;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 70px;
    border-bottom:1px solid #ddd;
}

.logo h2{
    font-size:30px;
}

.logo p{
    font-size:13px;
    color:gray;
}

nav ul{
    display:flex;
    list-style:none;
    gap:35px;
}

nav a{
    text-decoration:none;
    color:black;
    font-weight:bold;
}

.grid-container{
    width:95%;
    margin:30px auto;
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    grid-template-rows:300px 300px;
    gap:25px;
}

.left{
    grid-row:1/3;
}

.box{
    position:relative;
    overflow:hidden;
}

.box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.box::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
}

.content{
    position:absolute;
    top:50%;
    left:50px;
    transform:translateY(-50%);
    color:white;
    z-index:2;
}

.content h1{
    font-size:60px;
    margin-bottom:15px;
}

.content p{
    font-size:20px;
    margin-bottom:20px;
}

.content button{
    padding:15px 30px;
    border:2px solid white;
    background:transparent;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    z-index:2;
}

.text h2{
    font-size:38px;
    margin-bottom:10px;
}

.text p{
    font-size:20px;
}
</style>
</head>
