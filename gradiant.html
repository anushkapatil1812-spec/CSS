<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            height: 300px;
            width: 300px;
            background-color: rgba(27,72,54,0.2);
            display: inline-block;
            margin: 20px;
            border-radius: 100%;
        }
        .box1{

            background-image: linear-gradient(red,rgb(6, 72, 6),blue,rgb(245, 226, 18),yellow,black,rgb(171, 89, 103));
        }
         .box2{

            background-image: radial-gradient(red,purple,maroon,orange);
        }
    .box3{

            background-image: conic-gradient(pink,purple,red,orange);
        } 
        /*colour theory options  */
/* rgb,rgba,(coloue web:css colour pallate),hsla,hexa */
    /* gradient: transition between 2 0r more than 2 colour */
    /* linear gradient,conic gradiant,radial gradient */
    </style>
</head>
<body>
   <div class="box1"></div>
   <div class="box2"></div>
   <div class="box3"></div> 
</body>
</html>
