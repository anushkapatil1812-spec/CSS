<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxes with Center Circle</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 640px;
            margin: 30px auto;
            transition: 0.3s;
        }

        .container:hover{
            box-shadow: 0 0 30px red;
        }

        .box{
            width: 200px;
            height: 200px;
            background-color: azure;
            border: 2px solid black;

            display: flex;
            justify-content: center;
            align-items: center;

            transition: 0.3s;
        }

        .box:hover{
            box-shadow: 0 0 20px red;
        }

        .circle{
            width: 80px;
            height: 80px;
            background-color: rgb(221, 216, 216);
            border-radius: 50%;
            transition: 0.4s ease;
        }

        .circle:hover{
            background: linear-gradient(red, brown, black);
            transform: scale(1.1);
            box-shadow: 0 0 15px red;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="box">
            <div class="circle"></div>
        </div>

        <div class="box">
            <div class="circle"></div>
        </div>

        <div class="box">
            <div class="circle"></div>
        </div>

        <div class="box">
            <div class="circle"></div>
        </div>

        <div class="box">
            <div class="circle"></div>
        </div>

        <div class="box">
            <div class="circle"></div>
        </div>

    </div>

</body>
</html>
