<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            height: 100vh;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-rows: 80px 1fr 80px;
            gap:3px;

        }
        header{
            background-color: aqua;
            grid-column: 1/4;
        }
        nav{
            background-color: blueviolet;
            grid-column: 1/2;
        }
        main{
            background-color: brown;
            grid-column: 2/3;
        }
        footer{
            background-color: rgb(202, 230, 24);
            grid-column: 1/4;
        }
        aside{
            background-color: greenyellow;
            grid-column: 3/4;
        }
    </style>
</head>
<body>
    <div class="container">
       
        <header>Header</header>
        <nav>nav</nav>
        <main>Main</main>
        <aside>sidebar</aside>
        <footer>Footer</footer>
    </div>
</body>
</html>
