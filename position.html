<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Pattern</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:white;
}

.container{
    display:grid;
    grid-template-columns:repeat(8, 80px);
}

.box{
    width:80px;
    height:80px;
}

.black{
    background:black;
}

.box img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<div class="container">

    <!-- Row 1 -->
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>

    <!-- Row 2 -->
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>
    <div class="box black"></div>

    <!-- Row 3 -->
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=300" alt=""></div>

    <!-- Row 4 -->
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>
    <div class="box black"></div>
    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>

    <div class="box"><img src="https://cdn.pixabay.com/photo/2023/03/17/14/42/girl-7859689_1280.png" alt=""></div>

</div>

</body>
</html>
