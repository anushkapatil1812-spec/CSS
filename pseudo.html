<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: blue;
             transition-duration:2s ;
             transition-timing-function: ease;
             transition-delay:2s;
        }
        div:hover{
            height: 300px;
            width: 200px;
            border-radius: 10%;
            background-color: blueviolet;
        }
        button{
            height: 70px;
            width: 100px;
            background-color: white;
            color:blue;
            
            border-radius: 20px;
        }
        button:hover{
            background-color: blue;
            color: white;
        }
        a:hover{
            text-decoration-style: solid ;
            text-decoration-color:rgb(223, 51, 79) ;
            text-decoration-line: underline;
            
        }
        a:visited{
            color: blueviolet;
        }
        a:active{
            color: aqua;
        }
        a:link{
            color: brown;
        }
    </style>
</head>
<body>
    <div></div><br>
    <button>Submit</button><br>
    <a href="#">Go to google.</a>
    <!-- hover,visited,active,link-->
    <!-- pseido effect-fake behaviour hover active link -->
</body>
</html>
