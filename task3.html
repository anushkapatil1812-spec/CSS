<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAPES</title>
    <style>
        .body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: aliceblue;
        }
        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 20px;
        }
        .leaf{
            container: " ";
            height: 180px;
            width: 190px;
            background-color: rgb(11, 238, 238);
            border-radius:  0 90% 0 90%;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 20px;
        }
        .halfoval{
            container: " ";
            height: 150px;
            width: 300px;
            background-color: rgb(0, 34, 255);
            border-radius:  0  0 150px 150px;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 15px;
        }
        .oval{
            container: " ";
            height: 200px;
            width: 300px;
            background-color: rgb(255, 174, 0);
            border-radius:  100%;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 20px;
        }
        .twist{
            container: " ";
            height: 150px;
            width: 250px;
            background-color: green;
            border-radius:   0 100% 0 100%;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 10px;
        }
        .twist2{
            container: " ";
            height: 180px;
            width: 350px;
            background-color: purple;
            border-radius:   0 100px 0 100px;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 10px;
        }
        .circle{
            container: " ";
            height: 200px;
            width: 200px;
            background-color:rgb(255, 0, 200);
            border-radius:  100%;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 20px;
        }
        .tab{
            container: " ";
            height: 200px;
            width: 200px;
            background-color: rgb(11, 238, 238);
            border-radius:  0  0 150px 150px;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 15px;
        }
        .threeside{
            container: " ";
            height: 200px;
            width: 200px;
            background-color:blue;
            border-radius: 0 100%  100% 100%;
            color: white;
            text-align: center;
            line-height: 180px;
            font-size: 15px;
        }
    </style>
    

    
</head>
<body>
    <div class="container">
    <div class="leaf">
        <h2>LEAF</h2>
    </div>
     <div class="halfoval">
        <h2>HALF OVAL</h2>
    </div>
    <div class="oval">
        <h2>OVAL</h2>
    </div>
    <div class="twist">
        <h2>TWIST</h2>
    </div>
    <div class="twist2">
        <h2>TWIST2</h2>
    </div>
    <div class="circle">
        <h2>CIRCLE</h2>
    </div>
    <div class="tab">
        <h2>TAB</h2>
    </div>
    <div class="threeside">
        <h2>THREE SIDED</h2>
    </div>
</div>
</body>
</html>
